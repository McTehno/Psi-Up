services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psi_up_backend
    ports:
      - "8000:8000"
    # Ker uporabljate Cloud MongoDB, zaledje zgolj prebere lokalni .env
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: psi_up_frontend
    ports:
      - "3000:80" # Aplikacija bo dostopna na http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped