name: CI + Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Run CI checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        working-directory: backend
        run: pytest

  deploy-staging:
    name: Deploy to staging VPS
    runs-on: ubuntu-latest
    needs: ci
    environment: staging

    steps:
      - name: Configure SSH
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          set -euo pipefail

          : "${STAGING_HOST:?Missing STAGING_HOST secret}"
          : "${STAGING_SSH_KEY:?Missing STAGING_SSH_KEY secret}"

          STAGING_PORT="${STAGING_PORT:-22}"

          mkdir -p ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" | tr -d '\r' > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key

          ssh-keyscan -T 10 -p "$STAGING_PORT" "$STAGING_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
        run: |
          set -euo pipefail

          : "${STAGING_HOST:?Missing STAGING_HOST secret}"
          : "${STAGING_USER:?Missing STAGING_USER secret}"

          STAGING_PORT="${STAGING_PORT:-22}"

          ssh -i ~/.ssh/staging_key \
              -p "$STAGING_PORT" \
              "$STAGING_USER@$STAGING_HOST" \
              "/opt/psi-up/deploy-staging.sh"